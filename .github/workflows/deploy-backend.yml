name: Deploy Backend to Render

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Render
      run: |
        set -e
        response=$(curl -s -w "\n%{http_code}" -X POST \
          -H "Content-Type: application/json" \
          "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}")
        
        status_code=$(echo "$response" | tail -n1)
        body=$(echo "$response" | sed '$d')
        
        echo "Deployment Response: $body"
        
        if [ "$status_code" -lt 200 ] || [ "$status_code" -gt 299 ]; then
          echo "Deployment failed with status code: $status_code"
          exit 1
        fi
        
        echo "✓ Backend deployment initiated successfully"
